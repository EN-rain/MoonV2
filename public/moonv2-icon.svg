<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MoonV2 Studio Icon</title>
  <desc id="desc">A dark premium geometric crescent moon icon with a neon crimson diagonal V2 slash and subtle violet glow on a transparent background.</desc>
  <defs>
    <filter id="violetGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.45 0 0 0 0.45  0 0.12 0 0 0.05  0.85 0 1 0 1  0 0 0 0.85 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.03 0 0 0  0 0 0.12 0 0.1  0 0 0 0.9 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="metal" x1="286" y1="158" x2="788" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31343D"/>
      <stop offset="0.42" stop-color="#06070B"/>
      <stop offset="1" stop-color="#1A1B22"/>
    </linearGradient>
    <linearGradient id="edge" x1="214" y1="136" x2="830" y2="904" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDA7FF"/>
      <stop offset="0.4" stop-color="#5B3BFF"/>
      <stop offset="1" stop-color="#FF174D"/>
    </linearGradient>
    <linearGradient id="slash" x1="392" y1="828" x2="660" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF174D"/>
      <stop offset="0.5" stop-color="#FF416C"/>
      <stop offset="1" stop-color="#FFE8EE"/>
    </linearGradient>
  </defs>

